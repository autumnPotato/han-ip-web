<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한입 (Han-ip) - 우리 학교 스마트 식단</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #deff9a;
            --text-main: #ffffff;
            --text-sub: #a0a0a0;
            --danger: #ff5e5e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        #app {
            width: 100%;
            max-width: 480px; /* 모바일 뷰 고정 */
            background-color: var(--bg-color);
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* Header */
        header {
            padding: 30px 20px 20px;
            background: linear-gradient(180deg, rgba(30,30,30,1) 0%, rgba(18,18,18,0) 100%);
        }

        .title-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
        }
        
        h1 span {
            color: var(--accent-color);
        }

        .date-info {
            color: var(--text-sub);
            font-size: 14px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            padding: 0 20px;
            margin-bottom: 20px;
            gap: 10px;
        }

        .tab {
            flex: 1;
            padding: 12px 0;
            text-align: center;
            background-color: var(--card-bg);
            border-radius: 12px;
            font-weight: 600;
            color: var(--text-sub);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .tab.active {
            background-color: rgba(222, 255, 154, 0.1);
            color: var(--accent-color);
            border-color: var(--accent-color);
        }

        /* Menu List */
        .menu-container {
            padding: 0 20px 100px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .corner-badge {
            display: inline-block;
            background-color: #333;
            color: var(--accent-color);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .menu-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .menu-items {
            color: var(--text-sub);
            font-size: 14px;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .menu-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #333;
            padding-top: 15px;
        }

        .price {
            font-weight: 700;
            font-size: 16px;
        }

        /* Sold Out State */
        .menu-card.sold-out::after {
            content: 'SOLD OUT';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.7);
            color: var(--danger);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
            backdrop-filter: blur(2px);
            z-index: 10;
        }

        /* Navigation Bar (Bottom) */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 480px;
            background-color: var(--card-bg);
            display: flex;
            justify-content: space-around;
            padding: 15px 0 calc(15px + env(safe-area-inset-bottom));
            border-top: 1px solid #333;
            z-index: 100;
        }

        .nav-item {
            color: var(--text-sub);
            text-align: center;
            font-size: 12px;
            font-weight: 500;
        }
        
        .nav-item.active {
            color: var(--accent-color);
        }

        .empty-state {
            text-align: center;
            padding: 50px 0;
            color: var(--text-sub);
        }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div class="title-wrapper">
            <h1>한입<span>.</span></h1>
            <div class="date-info" id="current-date"></div>
        </div>
        <p style="color: var(--text-sub); font-size: 14px;">학생식당 (제1식당)</p>
    </header>

    <div class="tabs">
        <div class="tab" data-meal="breakfast" onclick="changeTab('breakfast')">조식</div>
        <div class="tab" data-meal="lunch" onclick="changeTab('lunch')">중식</div>
        <div class="tab" data-meal="dinner" onclick="changeTab('dinner')">석식</div>
    </div>

    <div class="menu-container" id="menu-list">
        </div>

    <div class="bottom-nav">
        <div class="nav-item active">오늘의 식단</div>
        <div class="nav-item">주간 식단</div>
        <div class="nav-item">식당 정보</div>
    </div>
</div>

<script>
    // 1. Mock Data (API에서 받아올 데이터 구조)
    const menuData = {
        breakfast: [
            { corner: '간편식 (A코너)', title: '토스트 & 시리얼 세트', items: '식빵, 딸기잼, 버터, 콘푸로스트, 우유, 삶은계란', price: '3,500원', soldOut: false },
            { corner: '한식 (B코너)', title: '소고기 미역국 정식', items: '소고기미역국, 쌀밥, 두부조림, 배추김치, 김', price: '4,000원', soldOut: false }
        ],
        lunch: [
            { corner: '일품 (A코너)', title: '수제 등심 돈까스', items: '등심돈까스, 양배추샐러드, 밥, 크림스프, 깍두기', price: '5,500원', soldOut: true },
            { corner: '뚝배기 (B코너)', title: '얼큰 순두부 찌개', items: '순두부찌개, 공기밥, 계란말이, 어묵볶음, 깍두기', price: '5,000원', soldOut: false },
            { corner: '면/분식 (C코너)', title: '로제 떡볶이 & 튀김', items: '로제떡볶이, 김말이, 야끼만두, 단무지, 쿨피스', price: '4,500원', soldOut: false }
        ],
        dinner: [
            { corner: '한식 (A코너)', title: '제육볶음 & 쌈채소', items: '제육볶음, 상추/깻잎, 쌈장, 된장국, 쌀밥, 무생채', price: '5,500원', soldOut: false },
            { corner: '일품 (B코너)', title: '치킨 마요 덮밥', items: '치킨마요덮밥, 미니우동, 단무지, 배추김치', price: '5,000원', soldOut: false }
        ]
    };

    // 2. 현재 시간 및 날짜 세팅 로직
    function setDateAndAutoTab() {
        const now = new Date();
        const options = { month: 'long', day: 'numeric', weekday: 'short' };
        document.getElementById('current-date').innerText = now.toLocaleDateString('ko-KR', options);

        const hour = now.getHours();
        let targetMeal = 'lunch'; // 기본값

        // 시간 기반 지능형 메뉴 트래킹 (Vibe Coding 핵심)
        if (hour < 10) {
            targetMeal = 'breakfast'; // 오전 10시 이전: 조식
        } else if (hour >= 14 && hour < 19) {
            targetMeal = 'dinner'; // 오후 2시 ~ 저녁 7시: 석식
        } else if (hour >= 19) {
            targetMeal = 'breakfast'; // 저녁 7시 이후: 다음날 조식 (실제 서비스에선 날짜도 +1 처리 필요)
        }

        changeTab(targetMeal);
    }

    // 3. 탭 변경 및 렌더링 로직
    function changeTab(mealType) {
        // 탭 UI 활성화 상태 변경
        document.querySelectorAll('.tab').forEach(tab => {
            tab.classList.remove('active');
            if(tab.dataset.meal === mealType) {
                tab.classList.add('active');
            }
        });

        // 메뉴 데이터 렌더링
        renderMenus(mealType);
    }

    function renderMenus(mealType) {
        const container = document.getElementById('menu-list');
        const menus = menuData[mealType];
        container.innerHTML = ''; // 초기화

        if (!menus || menus.length === 0) {
            container.innerHTML = '<div class="empty-state">운영되는 식단이 없습니다.</div>';
            return;
        }

        menus.forEach(menu => {
            const card = document.createElement('div');
            card.className = `menu-card ${menu.soldOut ? 'sold-out' : ''}`;
            
            card.innerHTML = `
                <div class="corner-badge">${menu.corner}</div>
                <div class="menu-title">${menu.title}</div>
                <div class="menu-items">${menu.items}</div>
                <div class="menu-footer">
                    <div class="price">${menu.price}</div>
                    <div style="color: ${menu.soldOut ? 'var(--danger)' : 'var(--accent-color)'}; font-size: 14px; font-weight: bold;">
                        ${menu.soldOut ? '품절' : '주문가능'}
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // 앱 초기화 실행
    window.onload = setDateAndAutoTab;
</script>
</body>
</html>
