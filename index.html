<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한입 (Han-ip) - 교내 스마트 식단</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #deff9a;
            --text-main: #ffffff;
            --text-sub: #a0a0a0;
            --danger: #ff5e5e;
            --border-color: #333333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        #app {
            width: 100%;
            max-width: 480px;
            background-color: var(--bg-color);
            min-height: 100vh;
            position: relative;
            padding-bottom: 80px;
        }

        /* 1. Header & Calendar (상단 요일 탭) */
        header { padding: 20px 20px 10px; }
        .header-title { font-size: 24px; font-weight: 700; margin-bottom: 15px; }
        .header-title span { color: var(--accent-color); }

        .calendar-tabs {
            display: flex;
            justify-content: space-between;
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 20px;
        }
        .day-tab {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            width: 18%;
            transition: 0.2s;
        }
        .day-tab.active { background-color: var(--accent-color); color: #000; }
        .day-name { font-size: 12px; margin-bottom: 4px; font-weight: 500; }
        .day-date { font-size: 16px; font-weight: 700; }

        /* 2. Building Filter (건물 필터) */
        .building-filter {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding: 0 20px 15px;
            scrollbar-width: none;
        }
        .building-filter::-webkit-scrollbar { display: none; }
        
        .building-btn {
            white-space: nowrap;
            padding: 10px 16px;
            border-radius: 20px;
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-sub);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .building-btn.active {
            background-color: #fff;
            color: #000;
            border-color: #fff;
        }

        /* 3. Meal Time Tabs (조/중/석식) */
        .meal-tabs {
            display: flex;
            padding: 0 20px;
            margin-bottom: 20px;
            gap: 10px;
        }
        .meal-tab {
            flex: 1;
            padding: 12px 0;
            text-align: center;
            background-color: var(--card-bg);
            border-radius: 10px;
            font-weight: 600;
            color: var(--text-sub);
            cursor: pointer;
            border: 1px solid var(--border-color);
        }
        .meal-tab.active {
            background-color: rgba(222, 255, 154, 0.1);
            color: var(--accent-color);
            border-color: var(--accent-color);
        }

        /* 4. Menu List & Cards */
        .menu-container { padding: 0 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .menu-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .corner-badge {
            background-color: #333;
            color: var(--accent-color);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
        }

        .op-time { font-size: 12px; color: var(--text-sub); }

        .menu-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .menu-items { color: var(--text-sub); font-size: 14px; margin-bottom: 15px; line-height: 1.5; }
        
        .menu-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
        }
        .price { font-weight: 700; font-size: 18px; }

        /* Sold Out UI */
        .menu-card.sold-out::after {
            content: '품절 (Sold Out)';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.8);
            color: var(--danger);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 800;
            backdrop-filter: blur(2px);
            z-index: 10;
        }

        .empty-state { text-align: center; padding: 40px 0; color: var(--text-sub); }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div class="header-title">오늘의 <span>학식</span></div>
        <div class="calendar-tabs" id="calendar-container">
            </div>
    </header>

    <div class="building-filter" id="building-container">
        <button class="building-btn active" onclick="setBuilding('한투스퀘어')">한투스퀘어</button>
        <button class="building-btn" onclick="setBuilding('교우회관')">교우회관</button>
        <button class="building-btn" onclick="setBuilding('기숙사')">기숙사 식당</button>
    </div>

    <div class="meal-tabs">
        <div class="meal-tab active" data-meal="조식" onclick="setMeal('조식')">조식</div>
        <div class="meal-tab" data-meal="중식" onclick="setMeal('중식')">중식</div>
        <div class="meal-tab" data-meal="석식" onclick="setMeal('석식')">석식</div>
    </div>

    <div class="menu-container" id="menu-list">
        </div>
</div>

<script>
    // 상태 관리 변수
    let currentBuilding = '한투스퀘어';
    let currentMeal = '중식'; // 기본값 중식

    // PRD 맞춤형 목업 데이터 (건물 > 시간대 > 코너별 메뉴)
    const db = {
        "한투스퀘어": {
            "조식": [
                { corner: "한식", name: "얼큰 소고기 국밥", items: "소고기국밥, 깍두기, 김가루, 요구르트", price: "4,500원", time: "08:00 - 09:30", soldOut: false },
                { corner: "양식", name: "모닝 토스트 세트", items: "식빵, 스크램블에그, 베이컨, 시리얼, 우유", price: "4,000원", time: "08:00 - 09:30", soldOut: false }
            ],
            "중식": [
                { corner: "일식", name: "가츠동 (돈까스덮밥)", items: "가츠동, 미니우동, 단무지, 락교", price: "6,000원", time: "11:30 - 14:00", soldOut: true }, // 마감 테스트용
                { corner: "한식", name: "뚝배기 불고기", items: "뚝불고기, 쌀밥, 배추김치, 어묵볶음", price: "5,500원", time: "11:30 - 14:00", soldOut: false },
                { corner: "양식", name: "베이컨 크림 파스타", items: "크림파스타, 마늘빵, 피클, 탄산음료", price: "6,500원", time: "11:30 - 14:00", soldOut: false }
            ],
            "석식": [
                { corner: "일품", name: "치즈 닭갈비 덮밥", items: "닭갈비덮밥, 맑은장국, 쌈무", price: "5,500원", time: "17:30 - 19:00", soldOut: false }
            ]
        },
        "교우회관": {
            "조식": [],
            "중식": [
                { corner: "교직원식당", name: "한방 갈비탕 정식", items: "갈비탕, 잡곡밥, 섞박지, 해물파전, 오징어젓갈", price: "8,000원", time: "11:30 - 13:30", soldOut: false }
            ],
            "석식": []
        },
        "기숙사": {
            "조식": [
                { corner: "자율배식", name: "가정식 백반", items: "미역국, 계란후라이, 김, 멸치볶음, 김치", price: "3,500원", time: "07:30 - 09:00", soldOut: false }
            ],
            "중식": [
                { corner: "분식", name: "치즈 라면 & 충무김밥", items: "치즈라면, 충무김밥 5알, 단무지", price: "4,500원", time: "12:00 - 14:00", soldOut: false }
            ],
            "석식": [
                { corner: "한식", name: "제육 짜글이", items: "제육짜글이, 대접밥, 김가루, 계란찜", price: "5,000원", time: "17:30 - 19:00", soldOut: false }
            ]
        }
    };

    // 1. 날짜 및 요일 탭 렌더링 로직
    function renderCalendar() {
        const today = new Date();
        const container = document.getElementById('calendar-container');
        const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
        
        // 이번 주 월~금만 표시 (학식 특성 반영)
        const currentDay = today.getDay();
        const monday = new Date(today);
        monday.setDate(today.getDate() - currentDay + (currentDay === 0 ? -6 : 1)); // 월요일 계산

        for (let i = 0; i < 5; i++) {
            const date = new Date(monday);
            date.setDate(monday.getDate() + i);
            
            const isToday = date.toDateString() === today.toDateString();
            
            const tab = document.createElement('div');
            tab.className = `day-tab ${isToday ? 'active' : ''}`;
            tab.innerHTML = `
                <div class="day-name">${dayNames[date.getDay()]}</div>
                <div class="day-date">${date.getDate()}</div>
            `;
            
            // 날짜 클릭 이벤트 (UI만 변경되도록 처리)
            tab.onclick = () => {
                document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                renderMenus(); // 실제 앱에선 날짜 파라미터도 넘겨야 함
            };
            container.appendChild(tab);
        }
    }

    // 2. 건물 필터 변경 로직
    function setBuilding(buildingName) {
        currentBuilding = buildingName;
        document.querySelectorAll('.building-btn').forEach(btn => {
            btn.classList.remove('active');
            if(btn.innerText.includes(buildingName)) btn.classList.add('active');
        });
        renderMenus();
    }

    // 3. 시간대 탭 변경 로직
    function setMeal(mealType) {
        currentMeal = mealType;
        document.querySelectorAll('.meal-tab').forEach(tab => {
            tab.classList.remove('active');
            if(tab.dataset.meal === mealType) tab.classList.add('active');
        });
        renderMenus();
    }

    // 4. 화면에 메뉴 렌더링 (핵심 로직)
    function renderMenus() {
        const container = document.getElementById('menu-list');
        // 건물과 시간대에 맞는 데이터 호출
        const menus = db[currentBuilding] ? db[currentBuilding][currentMeal] : [];
        
        container.innerHTML = ''; // 기존 내용 초기화

        if (!menus || menus.length === 0) {
            container.innerHTML = `<div class="empty-state">해당 건물/시간에는 운영되는 식단이 없습니다.</div>`;
            return;
        }

        menus.forEach(menu => {
            const card = document.createElement('div');
            card.className = `menu-card ${menu.soldOut ? 'sold-out' : ''}`;
            
            card.innerHTML = `
                <div class="card-header">
                    <span class="corner-badge">${menu.corner}</span>
                    <span class="op-time"><i class="fa-regular fa-clock"></i> ${menu.time}</span>
                </div>
                <div class="menu-title">${menu.name}</div>
                <div class="menu-items">${menu.items}</div>
                <div class="menu-footer">
                    <div class="price">${menu.price}</div>
                    <div style="color: ${menu.soldOut ? 'var(--danger)' : 'var(--accent-color)'}; font-size: 14px; font-weight: bold;">
                        ${menu.soldOut ? '마감됨' : '주문가능'}
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // 초기화 실행
    window.onload = () => {
        renderCalendar(); // 오늘 날짜 감지 및 캘린더 생성
        
        // 시간에 따른 자동 탭 선택 (기획안 반영)
        const hour = new Date().getHours();
        if (hour < 10) setMeal('조식');
        else if (hour < 14) setMeal('중식');
        else setMeal('석식');
    };
</script>
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</body>
</html>
