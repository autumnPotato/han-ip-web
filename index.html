<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한입 (Han-ip) - 교내 스마트 식단</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #deff9a;
            --text-main: #ffffff;
            --text-sub: #a0a0a0;
            --danger: #ff5e5e;
            --border-color: #333333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        #app {
            width: 100%;
            max-width: 480px;
            background-color: var(--bg-color);
            min-height: 100vh;
            position: relative;
            padding-bottom: 80px;
        }

        /* 1. Header & Calendar */
        header { padding: 20px 20px 10px; }
        .header-title { font-size: 24px; font-weight: 700; margin-bottom: 15px; }
        .header-title span { color: var(--accent-color); }

        .calendar-tabs {
            display: flex;
            justify-content: space-between;
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 20px;
            gap: 4px;
        }
        .day-tab {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px 4px;
            border-radius: 8px;
            cursor: pointer;
            flex: 1; /* 7일이 균등하게 화면을 나누어 가지도록 설정 */
            min-width: 0;
            transition: 0.2s;
        }
        .day-tab.active { background-color: var(--accent-color); color: #000; }
        .day-name { font-size: 11px; margin-bottom: 4px; font-weight: 500; }
        .day-date { font-size: 15px; font-weight: 700; }

        /* 2. Building Filter */
        .building-filter {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding: 0 20px 15px;
            scrollbar-width: none;
        }
        .building-filter::-webkit-scrollbar { display: none; }
        
        .building-btn {
            white-space: nowrap;
            padding: 10px 16px;
            border-radius: 20px;
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-sub);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .building-btn.active {
            background-color: #fff;
            color: #000;
            border-color: #fff;
        }

        /* 3. Meal Time Tabs */
        .meal-tabs {
            display: flex;
            padding: 0 20px;
            margin-bottom: 20px;
            gap: 10px;
        }
        .meal-tab {
            flex: 1;
            padding: 12px 0;
            text-align: center;
            background-color: var(--card-bg);
            border-radius: 10px;
            font-weight: 600;
            color: var(--text-sub);
            cursor: pointer;
            border: 1px solid var(--border-color);
        }
        .meal-tab.active {
            background-color: rgba(222, 255, 154, 0.1);
            color: var(--accent-color);
            border-color: var(--accent-color);
        }

        /* 4. Menu List & Cards */
        .menu-container { padding: 0 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .menu-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .corner-badge {
            background-color: #333;
            color: var(--accent-color);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
        }

        .op-time { font-size: 12px; color: var(--text-sub); }

        .menu-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .menu-items { color: var(--text-sub); font-size: 14px; margin-bottom: 15px; line-height: 1.5; }
        
        .menu-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
        }
        .price { font-weight: 700; font-size: 18px; }

        /* Sold Out UI */
        .menu-card.sold-out::after {
            content: '품절 (Sold Out)';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.8);
            color: var(--danger);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 800;
            backdrop-filter: blur(2px);
            z-index: 10;
        }

        .empty-state { text-align: center; padding: 50px 20px; color: var(--text-sub); line-height: 1.6; font-size: 15px; }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div class="header-title">오늘의 <span>학식</span></div>
        <div class="calendar-tabs" id="calendar-container"></div>
    </header>

    <div class="building-filter" id="building-container">
        <button class="building-btn active" onclick="setBuilding('한투스퀘어')">한투스퀘어</button>
        <button class="building-btn" onclick="setBuilding('교우회관')">교우회관</button>
        <button class="building-btn" onclick="setBuilding('기숙사')">기숙사 식당</button>
    </div>

    <div class="meal-tabs">
        <div class="meal-tab active" data-meal="조식" onclick="setMeal('조식')">조식</div>
        <div class="meal-tab" data-meal="중식" onclick="setMeal('중식')">중식</div>
        <div class="meal-tab" data-meal="석식" onclick="setMeal('석식')">석식</div>
    </div>

    <div class="menu-container" id="menu-list">
        </div>
</div>

<script>
    let currentBuilding = '한투스퀘어';
    let currentMeal = '중식';
    let currentDayName = ''; // 현재 선택된 요일 이름 (월, 화, 수...)
    let db = {}; 

    async function fetchMenuData() {
        try {
            const response = await fetch('data.json'); 
            db = await response.json(); 
            renderMenus(); 
        } catch (error) {
            console.error("데이터를 불러오는데 실패했습니다:", error);
            document.getElementById('menu-list').innerHTML = '<div class="empty-state">메뉴 데이터를 서버에서 불러올 수 없습니다.</div>';
        }
    }

    function renderCalendar() {
        const today = new Date();
        const container = document.getElementById('calendar-container');
        const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
        const currentDay = today.getDay();
        
        // 이번 주 월요일 날짜 계산
        const monday = new Date(today);
        monday.setDate(today.getDate() - currentDay + (currentDay === 0 ? -6 : 1));

        container.innerHTML = '';

        // 월요일부터 일요일까지 총 7일을 화면에 생성
        for (let i = 0; i < 7; i++) {
            const date = new Date(monday);
            date.setDate(monday.getDate() + i);
            const dayName = dayNames[date.getDay()];
            const isToday = date.toDateString() === today.toDateString();
            
            if (isToday) {
                currentDayName = dayName; // 앱 최초 접속 시 오늘 요일을 기본값으로 타겟팅
            }
            
            const tab = document.createElement('div');
            tab.className = `day-tab ${isToday ? 'active' : ''}`;
            tab.innerHTML = `
                <div class="day-name">${dayName}</div>
                <div class="day-date">${date.getDate()}</div>
            `;
            
            tab.onclick = () => {
                document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentDayName = dayName; // 클릭한 요일로 전역 변수 업데이트
                renderMenus();
            };
            container.appendChild(tab);
        }

        if (!currentDayName) {
            currentDayName = dayNames[today.getDay()];
        }
    }

    function setBuilding(buildingName) {
        currentBuilding = buildingName;
        document.querySelectorAll('.building-btn').forEach(btn => {
            btn.classList.remove('active');
            if(btn.innerText.includes(buildingName)) btn.classList.add('active');
        });
        renderMenus();
    }

    function setMeal(mealType) {
        currentMeal = mealType;
        document.querySelectorAll('.meal-tab').forEach(tab => {
            tab.classList.remove('active');
            if(tab.dataset.meal === mealType) tab.classList.add('active');
        });
        renderMenus();
    }

    function renderMenus() {
        const container = document.getElementById('menu-list');
        
        // ★ 주말 예외 처리 로직 추가
        if (currentDayName === '토' || currentDayName === '일') {
            container.innerHTML = `<div class="empty-state"> 주말에는 학식을 운영하지 않습니다.<br>평일에 다시 찾아주세요! ✨</div>`;
            return;
        }

        if (Object.keys(db).length === 0) return; 

        // db[건물][요일][시간대] 형태로 트리 가동
        const buildingData = db[currentBuilding] || {};
        const dayData = buildingData[currentDayName] || {};
        const menus = dayData[currentMeal] || [];
        
        container.innerHTML = ''; 

        if (!menus || menus.length === 0) {
            container.innerHTML = `<div class="empty-state">해당 건물/시간에는 운영되는 식단이 없습니다.</div>`;
            return;
        }

        menus.forEach(menu => {
            const card = document.createElement('div');
            card.className = `menu-card ${menu.soldOut ? 'sold-out' : ''}`;
            
            card.innerHTML = `
                <div class="card-header">
                    <span class="corner-badge">${menu.corner}</span>
                    <span class="op-time"><i class="fa-regular fa-clock"></i> ${menu.time}</span>
                </div>
                <div class="menu-title">${menu.name}</div>
                <div class="menu-items">${menu.items}</div>
                <div class="menu-footer">
                    <div class="price">${menu.price}</div>
                    <div style="color: ${menu.soldOut ? 'var(--danger)' : 'var(--accent-color)'}; font-size: 14px; font-weight: bold;">
                        ${menu.soldOut ? '마감됨' : '주문가능'}
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    window.onload = () => {
        renderCalendar(); 
        
        const hour = new Date().getHours();
        if (hour < 10) setMeal('조식');
        else if (hour < 14) setMeal('중식');
        else setMeal('석식');

        fetchMenuData(); 
    };
</script>

<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</body>
</html>
